mcs.metadata:
  componentName: Github Search - List every file in a repo (recursive)
kind: TaskDialog
modelDisplayName: List every file in a repo (recursive)
modelDescription: Returns the full file tree in one call when recursive=1. tree_sha is a branch name (e.g. main) or a tree/commit SHA. To enumerate one skill's files, keep items where type='blob' and path starts with the skill's folder; each item's "sha" feeds GetBlob. If "truncated"=true the repo was too large and the tree is incomplete.
outputs:
  - propertyName: sha

  - propertyName: tree

  - propertyName: truncated

  - propertyName: url

action:
